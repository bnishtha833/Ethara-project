<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Tasks — Nexus</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="nav-island">
    <div class="sidebar-logo"><span class="gradient-text">Nexus</span></div>
    <nav style="flex:1">
      <div class="nav-section">
        <a class="nav-link" data-page="dashboard" href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a class="nav-link" data-page="projects" href="projects.html"><span class="nav-icon">📁</span> Projects</a>
        <a class="nav-link" data-page="tasks" href="tasks.html"><span class="nav-icon">✅</span> Tasks</a>
      </div>
      <div class="nav-section" id="admin-nav" style="display:none; margin-top: 24px;">
        <div style="font-size: 11px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; padding-left: 16px; letter-spacing: 0.1em;">Admin</div>
        <a class="nav-link" data-page="users" href="users.html"><span class="nav-icon">👥</span> Team Members</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div id="sidebar-user" style="margin-bottom: 12px;"></div>
      <button class="nav-link" onclick="doLogout()" style="width:100%; text-align:left; color:var(--danger); background:none; border:none; cursor:pointer"><span class="nav-icon">🚪</span> Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header animate-in">
      <div class="flex items-center justify-between">
        <div><h1 class="gradient-text">Task Board</h1><p class="text-muted">Track and manage all tasks in your Nexus workspace.</p></div>
        <button class="btn btn-primary" id="new-task-btn" onclick="openTaskModal()" style="display:none">+ New Task</button>
      </div>
    </div>

    <div class="toolbar animate-in" style="animation-delay: 0.1s">
      <div class="toolbar-left" style="gap: 16px;">
        <div class="form-control" style="max-width:300px; display:flex; align-items:center; gap:10px; background: hsla(0,0%,100%,0.05)">
          <span>🔍</span>
          <input id="search-tasks" style="background:none; border:none; color:inherit; outline:none; width:100%" placeholder="Search tasks..." oninput="filterAndRender()"/>
        </div>
        <select id="filter-project" class="form-control" style="width:auto" onchange="filterAndRender()">
          <option value="">All Projects</option>
        </select>
        <select id="filter-priority" class="form-control" style="width:auto" onchange="filterAndRender()">
          <option value="">All Priorities</option>
          <option value="high">🔴 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
        <select id="filter-assignee" class="form-control" style="width:auto;display:none" onchange="filterAndRender()">
          <option value="">All Assignees</option>
        </select>
      </div>
    </div>

    <!-- Kanban Board -->
    <div class="kanban-board animate-in" style="animation-delay: 0.2s">
      <div class="kanban-col">
        <div class="kanban-col-header">
          <div class="kanban-col-title">To Do <span class="col-count" id="count-todo">0</span></div>
        </div>
        <div id="col-todo"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-header">
          <div class="kanban-col-title" style="color:var(--primary-light)">In Progress <span class="col-count" id="count-in_progress">0</span></div>
        </div>
        <div id="col-in_progress"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-header">
          <div class="kanban-col-title" style="color:var(--accent2)">Done <span class="col-count" id="count-done">0</span></div>
        </div>
        <div id="col-done"></div>
      </div>
    </div>
  </main>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="glass-card auth-card" style="max-width:600px; padding: 40px;">
    <div class="flex items-center justify-between mb-6">
      <h2 id="task-modal-title">New Task</h2>
      <button class="btn btn-secondary btn-icon" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input id="task-title" class="form-control" placeholder="Task title"/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="task-desc" class="form-control" rows="3" placeholder="Task details..."></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="form-group">
        <label class="form-label">Project *</label>
        <select id="task-project" class="form-control"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Assign To</label>
        <select id="task-assignee" class="form-control"><option value="">Unassigned</option></select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="task-status" class="form-control">
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select id="task-priority" class="form-control">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input id="task-due" class="form-control" type="date"/>
      </div>
    </div>
    <div class="flex gap-3" style="justify-content:flex-end; margin-top: 32px;">
      <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" id="task-save-btn" onclick="saveTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- Task Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="glass-card auth-card" style="max-width:520px; padding: 40px;">
    <div class="flex items-center justify-between mb-6">
      <h2 id="detail-title" style="font-size:20px"></h2>
      <button class="btn btn-secondary btn-icon" onclick="closeDetailModal()">✕</button>
    </div>
    <div id="detail-body"></div>
    <div class="flex gap-3" style="margin-top:32px;justify-content:flex-end" id="detail-actions"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/tasks.js"></script>
</body>
</html>
